{% extends "base.html" %}

{% block title %}URL Shortener - Shorten Your Links{% endblock %}

{% block content %}
<div class="hero">
    <h1>Shorten Your Links</h1>
    <p class="subtitle">Paste a long URL, get a short one. Track clicks in real time.</p>
</div>

<div class="card shorten-card">
    <form id="shorten-form">
        <div class="form-group">
            <label for="url">Long URL</label>
            <input type="url" id="url" name="url" placeholder="https://example.com/very/long/url..." required>
        </div>
        <div class="form-group">
            <label for="alias">Custom Alias <span class="optional">(optional)</span></label>
            <input type="text" id="alias" name="alias" placeholder="my-link" maxlength="30">
        </div>
        <button type="submit" class="btn btn-primary" id="submit-btn">Shorten URL</button>
    </form>

    <div id="error-msg" class="error-msg" style="display:none;"></div>

    <div id="result" class="result" style="display:none;">
        <p class="result-label">Your shortened URL:</p>
        <div class="result-url-row">
            <a id="short-url" href="#" target="_blank" class="short-url-link"></a>
            <button id="copy-btn" class="btn btn-copy" title="Copy to clipboard">Copy</button>
        </div>
        <a id="stats-link" href="#" class="stats-link">View stats &rarr;</a>
    </div>
</div>
{% endblock %}
